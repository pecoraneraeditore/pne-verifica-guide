name: Verifica Apertura Ristoranti

on:
  schedule:
    - cron: '30 7 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verifica:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze Python
        run: pip install pandas openpyxl requests playwright -q

      - name: Installa browser Playwright
        run: playwright install chromium --with-deps

      - name: Esegui verifica e invia email
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: pecoraneraeditore/pne-verifica-guide
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        run: python verifica_routine.py
