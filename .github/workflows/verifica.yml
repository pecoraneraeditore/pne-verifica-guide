name: Verifica Apertura Ristoranti

on:
  schedule:
    - cron: '30 7 * * 1,4'  # 9:30 ora italiana (UTC+2 estate)
  workflow_dispatch:          # permette avvio manuale dal tab Actions

permissions:
  contents: write  # necessario per il git push dei file Verifica aggiornati

jobs:
  verifica:
    runs-on: ubuntu-latest
    timeout-minutes: 60       # max 1 ora (SerpAPI + scraping leggero)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze Python
        run: pip install pandas openpyxl requests beautifulsoup4 -q

      - name: Esegui verifica e invia email
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python verifica_v5.py
