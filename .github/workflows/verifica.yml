name: Verifica Apertura Ristoranti

on:
  schedule:
    - cron: '30 7 * * 1,4'  # 9:30 ora italiana (UTC+2 estate)
  workflow_dispatch:          # permette avvio manuale dal tab Actions

permissions:
  contents: write  # necessario per il git push dei file Verifica aggiornati

jobs:
  verifica:
    runs-on: ubuntu-latest
    timeout-minutes: 60       # max 1 ora (SerpAPI + scraping leggero)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze Python
        run: pip install pandas openpyxl requests beautifulsoup4 -q

      - name: Esegui verifica e invia email
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python verifica_v5.py

      # ──────────────────────────────────────────────────────────────────────
      # Rigenerazione mappa auto-aggiornante (GitHub Pages)
      # Legge data/Roma_2027.xlsx, geocodifica i nuovi indirizzi (con cache),
      # e committa il JSON in docs/data/ + la cache aggiornata in mappa/.
      # La pagina docs/index.html lo legge a runtime → la mappa è sempre fresca.
      # ──────────────────────────────────────────────────────────────────────
      - name: Rigenera dati mappa (Roma)
        run: |
          python mappa/genera_mappa.py data/Roma_2027.xlsx \
            --out docs/data/roma.json \
            --cache mappa/geocode_cache.json \
            --citta-default Roma
             --regione Lazio

      - name: Commit & push aggiornamenti mappa
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/*.json mappa/geocode_cache.json
          if git diff --cached --quiet; then
            echo "Nessun cambiamento alla mappa."
          else
            git commit -m "chore(mappa): aggiornamento automatico $(date -u +%Y-%m-%d)"
            git push
          fi
