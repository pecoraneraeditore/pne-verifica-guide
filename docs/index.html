<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mappa Ristoranti — La Pecora Nera</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="favicon-64.png">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #000; color: #fff;
  }
  .page {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .brand {
    display: flex; flex-direction: column; align-items: center; gap: 24px;
    margin-bottom: 60px;
  }
  .brand img { width: 320px; max-width: 80vw; height: auto; }
  .tagline {
    font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
    opacity: 0.6; font-weight: 400;
  }
  .cards {
    display: grid; gap: 20px;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    width: 100%; max-width: 780px;
  }
  .card {
    display: flex; flex-direction: column;
    background: #111; border: 1px solid #222; border-radius: 10px;
    padding: 28px 24px; text-decoration: none; color: #fff;
    transition: all 0.18s ease;
  }
  .card:hover {
    background: #181818; border-color: #444;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
  }
  .card .city {
    font-size: 26px; font-weight: 700; letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .card .count {
    font-size: 13px; color: #aaa; line-height: 1.5;
    margin-bottom: 16px; min-height: 40px;
  }
  .card .count .num { color: #fff; font-weight: 600; font-size: 16px; }
  .card .updated { font-size: 11px; color: #666; margin-top: auto; }
  .card .arrow {
    display: inline-block; margin-top: 12px; font-size: 14px;
    color: #fff; opacity: 0.5; transition: opacity 0.18s, transform 0.18s;
  }
  .card:hover .arrow { opacity: 1; transform: translateX(3px); }
  .card.disabled {
    opacity: 0.4; pointer-events: none;
  }
  .card.disabled .count { color: #555; font-style: italic; }
  footer {
    margin-top: 60px; font-size: 11px; opacity: 0.4;
    text-align: center;
  }
  footer a { color: inherit; }
</style>
</head>
<body>
<div class="page">
  <div class="brand">
    <img src="logo_pn.png" alt="La Pecora Nera">
    <div class="tagline">Mappa Ristoranti · Guide 2027</div>
  </div>

  <div class="cards">
    <a class="card" href="roma/" data-city="roma" data-default-name="Roma">
      <div class="city">Roma</div>
      <div class="count" data-count>Caricamento…</div>
      <div class="updated" data-updated></div>
      <div class="arrow">Apri mappa →</div>
    </a>
    <a class="card" href="milano/" data-city="milano" data-default-name="Milano">
      <div class="city">Milano</div>
      <div class="count" data-count>Caricamento…</div>
      <div class="updated" data-updated></div>
      <div class="arrow">Apri mappa →</div>
    </a>
    <a class="card" href="torino/" data-city="torino" data-default-name="Torino">
      <div class="city">Torino</div>
      <div class="count" data-count>Caricamento…</div>
      <div class="updated" data-updated></div>
      <div class="arrow">Apri mappa →</div>
    </a>
  </div>

  <footer>
    Pecora Nera Editore · Indipendente per vocazione
  </footer>
</div>

<script>
// Per ogni card carica il JSON e popola count + data aggiornamento.
// Se il file non esiste ancora (es. Milano/Torino non ancora generati),
// la card viene marcata come "in arrivo" e disabilitata.
document.querySelectorAll('.card').forEach(async card => {
  const city = card.dataset.city;
  const countEl = card.querySelector('[data-count]');
  const updatedEl = card.querySelector('[data-updated]');
  try {
    const r = await fetch(`data/${city}.json?t=${Date.now()}`);
    if (!r.ok) throw new Error('non disponibile');
    const data = await r.json();
    const n = data.stats?.con_coordinate ?? 0;
    if (n === 0) throw new Error('vuoto');
    const approx = data.stats?.approssimati || 0;
    countEl.innerHTML = approx
      ? `<span class="num">${n}</span> ristoranti<br>(${data.stats.precisi} precisi, ${approx} approssimati)`
      : `<span class="num">${n}</span> ristoranti mappati`;
    const d = new Date(data.generated_at);
    updatedEl.textContent = `Aggiornata ${d.toLocaleString('it-IT',{dateStyle:'medium', timeStyle:'short'})}`;
  } catch (e) {
    card.classList.add('disabled');
    countEl.textContent = 'In arrivo prossimamente';
    updatedEl.textContent = '';
  }
});
</script>
</body>
</html>
